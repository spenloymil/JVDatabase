<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fantasy Drag Race · Queen Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     ROOT & RESET
  ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #080610;
    --surface:    #110e1e;
    --card:       #160f28;
    --border:     #271d42;
    --border2:    #3a2d5e;
    --pink:       #ff2d78;
    --magenta:    #d400a8;
    --gold:       #f5c842;
    --gold-dim:   #b8941f;
    --lilac:      #bf80ff;
    --cyan:       #00e5ff;
    --text:       #f5eeff;
    --muted:      #8a72b8;
    --faint:      #3d2f66;
    --winner-bg:  rgba(245,200,66,0.08);
    --winner-bdr: #f5c842;
    --2nd-bg:     rgba(191,128,255,0.08);
    --2nd-bdr:    #bf80ff;
    --low-bg:     rgba(255,45,120,0.08);
    --low-bdr:    #ff2d78;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ═══════════════════════════════════════════
     BACKGROUND TEXTURE
  ═══════════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(180,0,180,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,200,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(100,0,200,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* noise grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ═══════════════════════════════════════════
     LAYOUT
  ═══════════════════════════════════════════ */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
    display: none;
  }

  /* ═══════════════════════════════════════════
     HERO
  ═══════════════════════════════════════════ */
  .hero {
    text-align: center;
    padding: 4rem 1rem 3rem;
    position: relative;
  }

  .hero-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--magenta);
    font-weight: 500;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--lilac) 35%, var(--pink) 65%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.3s forwards;
  }

  /* decorative rule */
  .hero-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0 auto 2.5rem;
    max-width: 340px;
    opacity: 0;
    animation: fadeUp 0.6s 0.4s forwards;
  }
  .hero-rule::before, .hero-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--faint));
  }
  .hero-rule::after { background: linear-gradient(90deg, var(--faint), transparent); }
  .hero-rule span { color: var(--magenta); font-size: 1.1rem; }

  /* ═══════════════════════════════════════════
     SEARCH
  ═══════════════════════════════════════════ */
  .search-wrap {
    position: relative;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.5s forwards;
  }

  .search-icon {
    position: absolute;
    left: 1.1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    padding: 0.95rem 1rem 0.95rem 2.8rem;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    letter-spacing: 0.01em;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus {
    border-color: var(--lilac);
    box-shadow: 0 0 0 4px rgba(191,128,255,0.12), 0 0 30px rgba(191,128,255,0.06);
  }

  /* ═══════════════════════════════════════════
     STATS BAR
  ═══════════════════════════════════════════ */
  .stats-bar {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.6s forwards;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 0.4rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .stat-pill strong { color: var(--lilac); font-weight: 600; }

  /* ═══════════════════════════════════════════
     RESULTS LABEL
  ═══════════════════════════════════════════ */
  .results-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  /* ═══════════════════════════════════════════
     QUEEN CARDS
  ═══════════════════════════════════════════ */
  .queens-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    gap: 1rem;
  }

  .queen-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.6rem 1.8rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: cardIn 0.4s ease both;
  }
  .queen-card:hover {
    transform: translateY(-3px);
    border-color: var(--border2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(191,128,255,0.08);
  }

  /* top gradient stripe */
  .queen-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--magenta), var(--lilac), var(--cyan));
    opacity: 0.7;
  }

  /* decorative corner glow */
  .queen-card::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(191,128,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .queen-header { margin-bottom: 1.1rem; }

  .queen-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.65rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 0.25rem;
  }

  .queen-meta {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .meta-chip {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.18rem 0.6rem;
  }
  .meta-chip.wins { color: var(--gold); border-color: rgba(245,200,66,0.25); background: rgba(245,200,66,0.06); }

  .seasons-list { display: flex; flex-direction: column; gap: 0.35rem; }

  .season-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.85rem;
    border-radius: 9px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--border2);
    transition: background 0.15s;
  }
  .season-row:hover { background: rgba(255,255,255,0.055); }

  .season-row.p-winner { border-left-color: var(--winner-bdr); background: var(--winner-bg); }
  .season-row.p-second { border-left-color: var(--2nd-bdr); background: var(--2nd-bg); }
  .season-row.p-low    { border-left-color: var(--low-bdr);  background: var(--low-bg); }

  .season-name { font-size: 0.88rem; color: var(--text); font-weight: 500; }

  .placement-badge {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.2rem 0.65rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    white-space: nowrap;
  }
  .p-winner .placement-badge { background: rgba(245,200,66,0.15); color: var(--gold); }
  .p-second .placement-badge { background: rgba(191,128,255,0.18); color: var(--lilac); }
  .p-low    .placement-badge { background: rgba(255,45,120,0.15);  color: var(--pink); }

  /* ═══════════════════════════════════════════
     BROWSE GRID (compact, no search)
  ═══════════════════════════════════════════ */
  .browse-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
  }

  .browse-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: cardIn 0.35s ease both;
  }
  .browse-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .browse-card:hover .bc-name { color: var(--lilac); }

  .bc-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    transition: color 0.2s;
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }
  .bc-stat {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ═══════════════════════════════════════════
     EMPTY STATE
  ═══════════════════════════════════════════ */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; }

  /* ═══════════════════════════════════════════
     ADMIN MODAL
  ═══════════════════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,2,12,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 22px;
    padding: 2.2rem 2.4rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    background: linear-gradient(90deg, var(--lilac), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-sub {
    color: var(--muted);
    font-size: 0.83rem;
    margin-bottom: 1.8rem;
    letter-spacing: 0.03em;
  }

  .field-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 0.45rem;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    padding: 0.7rem 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 1.1rem;
  }
  .field-input:focus {
    border-color: var(--lilac);
    box-shadow: 0 0 0 3px rgba(191,128,255,0.12);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--magenta), #7a00cc);
    border: none;
    border-radius: 11px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0.8rem 2rem;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(212,0,168,0.3);
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .error-msg {
    font-size: 0.82rem;
    color: var(--pink);
    margin-top: -0.7rem;
    margin-bottom: 0.8rem;
    padding-left: 0.3rem;
    min-height: 1rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 30px;
    padding: 0.65rem 1.4rem;
    font-size: 0.88rem;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger cards */
  .queen-card:nth-child(1), .browse-card:nth-child(1) { animation-delay: 0.05s; }
  .queen-card:nth-child(2), .browse-card:nth-child(2) { animation-delay: 0.10s; }
  .queen-card:nth-child(3), .browse-card:nth-child(3) { animation-delay: 0.14s; }
  .queen-card:nth-child(4), .browse-card:nth-child(4) { animation-delay: 0.18s; }
  .queen-card:nth-child(5), .browse-card:nth-child(5) { animation-delay: 0.21s; }
  .queen-card:nth-child(6), .browse-card:nth-child(6) { animation-delay: 0.24s; }
  .queen-card:nth-child(n+7), .browse-card:nth-child(n+7) { animation-delay: 0.26s; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- MAIN APP -->
<div class="wrap" id="appWrap">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-eyebrow">✦ The Legendary &nbsp;·&nbsp; The Ferocious &nbsp;·&nbsp; The Iconic ✦</div>
    <h1 class="hero-title">Fantasy Drag Race</h1>
    <p class="hero-sub">Queen Database &amp; Season Records</p>
    <div class="hero-rule"><span>♛</span></div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search queens by name…" autocomplete="off" spellcheck="false"/>
  </div>

  <!-- Results label -->
  <div class="results-label" id="resultsLabel"></div>

  <!-- Queen list / grid -->
  <div id="queensContainer"></div>

</div>

<!-- Login modal -->
<div class="modal-overlay open" id="modalOverlay">
  <div class="modal">
    <h2>Enter the Werk Room</h2>
    <p class="modal-sub">This area is for the production team only.</p>
    <label class="field-label" for="codeInput">Secret Code</label>
    <input class="field-input" type="password" id="codeInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkCode()"/>
    <div class="error-msg" id="codeError"></div>
    <button class="btn-primary" onclick="checkCode()">Unlock ✦</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let QUEENS = [];
const SECRET = "SPORKY";
let authenticated = false;

function placementClass(p) {
  const l = String(p || "").toLowerCase();
  if (l.includes("winner") || l.includes("1st")) return "p-winner";
  if (l.includes("runner") || l.includes("2nd")) return "p-second";
  if (l.includes("elim") || l.includes("bottom")) return "p-low";
  return "";
}

function winCount(queen) {
  return queen.seasons.filter(s => placementClass(s.placement) === "p-winner").length;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function render() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  const container = document.getElementById("queensContainer");
  const label = document.getElementById("resultsLabel");
  const statsBar = document.getElementById("statsBar");

  const totalSeasons = QUEENS.reduce((a, q) => a + q.seasons.length, 0);
  const winners = QUEENS.filter(q => q.seasons.some(s => placementClass(s.placement) === "p-winner")).length;

  statsBar.innerHTML = `
    <div class="stat-pill"><strong>${QUEENS.length}</strong> Queens</div>
    <div class="stat-pill"><strong>${totalSeasons}</strong> Appearances</div>
    <div class="stat-pill"><strong>${winners}</strong> Winners</div>
  `;

  if (!query) {
    const sorted = [...QUEENS].sort((a, b) => a.name.localeCompare(b.name));
    label.textContent = `All ${sorted.length} queens`;
    container.innerHTML = `<div class="browse-grid">${
      sorted.map(q => `
        <div class="browse-card" onclick="searchFor('${q.name.replace(/'/g,"\\'")}')">
          <div class="bc-name">${q.name}</div>
          <div class="bc-stat">${q.seasons.length} appearance${q.seasons.length !== 1 ? "s" : ""}</div>
        </div>`).join("")
    }</div>`;
    return;
  }

  const results = QUEENS.filter(q => q.name.toLowerCase().includes(query));
  label.textContent = results.length ? `${results.length} queen${results.length !== 1 ? "s" : ""} found` : "";

  if (!results.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🪄</div>
        <p>No queens found matching "<em>${query}</em>"</p>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="queens-grid">${
    results.map(q => {
      const wins = winCount(q);
      const seasonsHTML = q.seasons.map(s => `
        <div class="season-row ${placementClass(s.placement)}">
          <span class="season-name">${s.season}</span>
          <span class="placement-badge">${s.placement}</span>
        </div>`).join("");

      return `
        <div class="queen-card">
          <div class="queen-header">
            <div class="queen-name">${q.name}</div>
            <div class="queen-meta">
              <span class="meta-chip">${q.seasons.length} appearance${q.seasons.length !== 1 ? "s" : ""}</span>
              ${wins ? `<span class="meta-chip wins">♛ ${wins} win${wins !== 1 ? "s" : ""}</span>` : ""}
            </div>
          </div>
          <div class="seasons-list">${seasonsHTML}</div>
        </div>`;
    }).join("")
  }</div>`;
}

function searchFor(name) {
  document.getElementById("searchInput").value = name;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("searchInput").addEventListener("input", render);

async function loadQueens() {
  try {
    const res = await fetch("queens.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`Failed to load queens.json (${res.status})`);
    const data = await res.json();
    QUEENS = Array.isArray(data) ? data : [];
    render();
  } catch (err) {
    console.error(err);
    showToast("Could not load queens.json");
    document.getElementById("queensContainer").innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>Could not load queens.json</p>
      </div>`;
  }
}

async function checkCode() {
  const val = document.getElementById("codeInput").value;
  if (val === SECRET) {
    authenticated = true;
    document.getElementById("codeError").textContent = "";
    document.getElementById("modalOverlay").classList.remove("open");
    document.getElementById("appWrap").style.display = "block";
    await loadQueens();
    setTimeout(() => document.getElementById("searchInput").focus(), 50);
  } else {
    document.getElementById("codeError").textContent = "Wrong code, honey. Try again! 💅";
    document.getElementById("codeInput").value = "";
    document.getElementById("codeInput").focus();
  }
}

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("appWrap").style.display = "none";
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("codeInput").focus();
});
</script>
</body>
</html>
